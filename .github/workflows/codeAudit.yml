name: Restore Dev from Prod (one-time)

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout prod repo
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/efficient-finance-widget
          token: ${{ secrets.GH_PAT }}
          path: prod

      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/efficient-finance-widget-dev
          token: ${{ secrets.GH_PAT }}
          path: dev

      - name: Copy prod into dev
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.dev.vars' \
            --exclude='wrangler.toml' \
            --exclude='.github/' \
            prod/ dev/

      - name: Commit and push to dev
        run: |
          cd dev
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "chore: restore workers/ structure from prod after accidental overwrite" && git push)