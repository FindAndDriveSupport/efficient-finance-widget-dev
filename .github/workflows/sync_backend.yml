name: Sync Shared Backend Files

on:
  push:
    branches:
      - main
    paths:
      - 'workers/routes/prediction.js'
      - 'workers/routes/createPolicy.js'
      - 'workers/routes/submitDocuments.js'
      - 'workers/routes/lookups.js'
      - 'workers/routes/preQual.js'
      - 'workers/routes/getApplicant.js'
      - 'workers/routes/getPolicies.js'
      - 'workers/routes/addressSearch.js'
      - 'workers/routes/dealerConfig.js'
      - 'workers/services/seritiAuth.js'
      - 'workers/utils/edithErrors.js'
      - 'workers/worker.js'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/efficient-finance-widget
          token: ${{ secrets.SYNC_PAT }}
          path: target

      - name: Copy shared files
        run: |
          SHARED_FILES=(
            "workers/routes/prediction.js"
            "workers/routes/createPolicy.js"
            "workers/routes/submitDocuments.js"
            "workers/routes/lookups.js"
            "workers/routes/preQual.js"
            "workers/routes/getApplicant.js"
            "workers/routes/getPolicies.js"
            "workers/routes/addressSearch.js"
            "workers/routes/dealerConfig.js"
            "workers/services/seritiAuth.js"
            "workers/utils/edithErrors.js"
            "workers/worker.js"
          )
          for FILE in "${SHARED_FILES[@]}"; do
            if [ -f "source/$FILE" ]; then
              mkdir -p "target/$(dirname $FILE)"
              cp "source/$FILE" "target/$FILE"
              echo "Copied $FILE"
            fi
          done

      - name: Commit and push changes
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "chore: sync shared backend files from efficient-finance-widget"
            git push
          fi

