name        = "efficient-finance-widget-dev"
main        = "workers/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_ENV = "development"

[observability.logs]
enabled = true
invocation_logs = true

[[kv_namespaces]]
binding  = "SERITI_CACHE"
id       = "16c7bf807bc0445ab0420a16f2352c0d"

[[d1_databases]]
binding = "DB"
database_name = "postal-codes-db"
database_id = "a518623c-f74b-4889-98da-d9ddda0ff632"

# Daily Edith policy status sync — runs at 02:00 UTC
[triggers]
crons = ["0 2 * * *"]

