# wrangler.toml — E-fficient Finance Widget — Cloudflare Worker config
name        = "efficient-finance-widget"
main        = "workers/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding  = "SERITI_CACHE"
id       = "16c7bf807bc0445ab0420a16f2352c0d"

[vars]
WORKER_ENV = "production"

[observability.logs]
enabled = true
invocation_logs = true


[[d1_databases]]
binding = "DB"
database_name = "postal-codes-db"
database_id = "a518623c-f74b-4889-98da-d9ddda0ff632"

[env.development]
name = "efficient-finance-widget-dev"

[env.development.vars]
WORKER_ENV = "development"
